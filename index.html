<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOfuscador | Encrypt Matrix Engine</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace; /* Fuente estilo hacker */
        }

        body {
            background-color: #0a0f1d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            color: #ef4444; /* Rojo premium */
            font-size: 24px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 24px;
        }

        .editor-section {
            margin-bottom: 18px;
            text-align: left;
        }

        .editor-section label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 250px;
            background-color: #070a13;
            border: 1px solid #1f2937;
            border-radius: 8px;
            color: #34d399; /* Texto verde brillante al escribir */
            padding: 15px;
            font-size: 14px;
            resize: none;
            outline: none;
            margin-bottom: 20px;
        }

        textarea::placeholder {
            color: #4b5563;
        }

        #luaOutput {
            color: #34d399;
            border-color: #1f2937;
        }

        button {
            width: 100%;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-bottom: 12px;
        }

        button:active {
            background-color: #dc2626;
        }

        #resetBtn {
            width: 100%;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NexusOfuscador</h1>
        <p class="subtitle">Secure script with Nexus Bytecode Matrix</p>
        
        <div class="editor-section">
            <label>Source Code (Lua)</label>
            <textarea id="luaInput" placeholder="Paste your clean script here..."></textarea>
        </div>
        
        <button id="obfuscateBtn">Obfuscate Script</button>
        <button id="resetBtn">Reset Fields</button>
        
        <div class="editor-section">
            <label>Obfuscated Output</label>
            <textarea id="luaOutput" placeholder="Your protected script will appear here..." readonly></textarea>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
